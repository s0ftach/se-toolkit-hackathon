services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymtrack-backend
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    volumes:
      - db-data:/app/data
    ports:
      - "${BACKEND_PORT:-8000}:80"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gymtrack-frontend
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
