services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymtrack-backend
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - HOST=0.0.0.0
    volumes:
      - db-data:/app/data
    ports:
      - "${BACKEND_PORT:-8000}:80"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gymtrack-frontend
    ports:
      - "8888:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
